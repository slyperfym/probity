[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read-write", path = "../deployments" }
]

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
